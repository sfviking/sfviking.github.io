<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartAmp — Authorized</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 12px;
      padding: 40px;
      max-width: 580px;
      width: 100%;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }

    .step { margin-bottom: 20px; }
    .step-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
    }
    .url-box {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px 14px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #a8d8a8;
      word-break: break-all;
      line-height: 1.6;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .url-box:hover { border-color: #555; }

    .copy-btn {
      margin-top: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 7px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .copy-btn:hover { background: #333; border-color: #555; }
    .copy-btn.copied { color: #6fcf97; border-color: #3a5a3a; }

    .instruction {
      background: #1e1e1e;
      border-left: 3px solid #4a9eff;
      border-radius: 0 6px 6px 0;
      padding: 14px 16px;
      font-size: 13px;
      color: #ccc;
      line-height: 1.6;
      margin-top: 24px;
    }
    .instruction code {
      background: #111;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 12px;
      color: #a8d8a8;
    }

    .error-card { border-color: #5a2a2a; }
    .error-card h1 { color: #f87171; }
    #error-detail {
      background: #111;
      border: 1px solid #3a2a2a;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: #f87171;
      margin-top: 12px;
    }
  </style>
</head>
<body>
<div class="card" id="card">
  <div id="content">Loading...</div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const code  = params.get('code');
  const error = params.get('error');
  const errorDesc = params.get('error_description') || error || 'Unknown error';
  const fullUrl = window.location.href;
  const card = document.getElementById('card');
  const content = document.getElementById('content');

  if (code) {
    // Detect environment from referrer or default to production
    const referrer = document.referrer || '';
    const isLocal = referrer.includes('localhost') || referrer.includes('127.0.0.1');
    const base = isLocal ? 'http://localhost:8000' : 'https://smartamp.fly.dev';
    const callbackUrl = `${base}/auth/callback?${params.toString()}`;
    window.location.href = callbackUrl;

    content.innerHTML = `
      <div class="icon">⚡</div>
      <h1>Tesla Authorized</h1>
      <p class="subtitle">Redirecting to SolarSmartCharge…</p>

      <div class="step">
        <div class="step-label">If you aren't redirected automatically</div>
        <div class="url-box" id="url-text" onclick="copyUrl()">${callbackUrl}</div>
        <button class="copy-btn" id="copy-btn" onclick="window.location.href='${callbackUrl}'">
          <span id="copy-icon">→</span>
          <span id="copy-label">Go manually</span>
        </button>
      </div>
    `;
  } else {
    card.classList.add('error-card');
    content.innerHTML = `
      <div class="icon">❌</div>
      <h1>Authorization Failed</h1>
      <div id="error-detail">${errorDesc}</div>
      <div class="instruction" style="border-color:#f87171; margin-top:16px">
        Close this tab and try running <code>python3 setup.py --reauth</code> again.
      </div>
    `;
  }

  function copyUrl() {
    navigator.clipboard.writeText(fullUrl).then(() => {
      document.getElementById('copy-label').textContent = 'Copied!';
      document.getElementById('copy-icon').textContent = '✓';
      document.getElementById('copy-btn').classList.add('copied');
      setTimeout(() => {
        document.getElementById('copy-label').textContent = 'Copy URL';
        document.getElementById('copy-icon').textContent = '⎘';
        document.getElementById('copy-btn').classList.remove('copied');
      }, 2500);
    });
  }
</script>
</body>
</html>
